# リモートで microCMS 等にアクセスするには、環境変数が必要です。
# サーバー上で next-app/.env.local を作成し、
# MICROCMS_SERVICE_DOMAIN, MICROCMS_API_KEY 等を設定してください（APIキーは Git に含めないこと）。
services:
  shop-next:
    build: ./next-app
    container_name: shop-next
    restart: unless-stopped
    env_file:
      - next-app/.env.local
    environment:
      - NODE_ENV=production
      - VIRTUAL_HOST=108teaworks.com,vibe.108teaworks.com
      - VIRTUAL_PORT=3000
      # HTTPS (Let's Encrypt): main-nginx-proxy が acme-companion を使っている場合に有効
      # 例: LETSENCRYPT_EMAIL=info@108teaworks.com
      - LETSENCRYPT_HOST=108teaworks.com,vibe.108teaworks.com
      - LETSENCRYPT_EMAIL=${LETSENCRYPT_EMAIL:-}
    volumes:
      # レビューキュー・トークン・レビューJSONをホストに永続化（コンテナ再起動でも保持）
      - ./next-app/data:/app/data
      # 商品画像をホストから参照（画像差し替えをコンテナ再起動なしで反映）
      - ./next-app/public/images/products:/app/public/images/products
    networks:
      - edgeai-shared-net
    expose:
      - "3000"

networks:
  edgeai-shared-net:
    external: true
